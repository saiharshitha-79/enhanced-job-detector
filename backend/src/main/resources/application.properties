# Database Configuration - Production (Render)
spring.datasource.url=jdbc:postgresql://dpg-xxxxxxxxx.oregon.render.com:5432/job_detector
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=job_detector_user
spring.datasource.password=xxxxxxxx

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server Configuration
server.port=${PORT:8080}

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:3001,https://*.vercel.app
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
